# ROS2 systemd automation configuration
#
# Notes:
# 1) actions.default_action defines the action used when no CLI action is provided
# 2) workspaces can define multiple ROS2 workspaces, each with its own services
# 3) each service is converted into a dedicated systemd unit file
# 4) services can optionally declare depends_on (list) for unit dependencies
#    Example: if A depends_on B, unit A will include Requires=B and After=B
# 5) services can optionally declare service_options (list of raw systemd [Service] lines)
#    Example: CapabilityBoundingSet=... / AmbientCapabilities=...
#
# Supported actions:
# - install                Install unit files only, do not start or enable
# - apply                  Install + start + enable on boot
# - uninstall              Uninstall (stop, disable, remove unit files)
# - update                 Stop previous units, remove stale units, then install/start/enable current units
# - makefile               Regenerate Makefile only (no systemd changes)

# Optional; when omitted, default action is `apply`.
# actions:
#   default_action: apply

# Optional; when omitted defaults are used.
# makefile:
#   output_path: ./ros2-systemd-manager.mk
#   command: ros2-systemd-manager

systemd:
  unit_dir: /etc/systemd/system
  wanted_by: multi-user.target

runtime:
  # Default runtime identity for services when use_root is omitted or false.
  # Set service.use_root: true to force that specific service to run as root.
  user: user
  group: user
  home: /home/user
  shell: /bin/bash
  restart: on-failure
  restart_sec: 3

workspaces:
  # Workspace key, selectable via --workspace-key
  default_ws:
    path: /home/user/default_ws
    setup_script: install/setup.bash
    services:
      - unit_name: ros2-foxglove-bridge.service
        description: ROS2 Foxglove Bridge
        # Optional: default false. When true, force this service to run as root.
        use_root: false
        launch_command: ros2 launch foxglove_bridge foxglove_bridge_launch.xml

      - unit_name: ros2-soem-bringup.service
        description: ROS2 SOEM Bringup
        use_root: false
        service_options:
          - CapabilityBoundingSet=CAP_NET_RAW CAP_NET_ADMIN
          - AmbientCapabilities=CAP_NET_RAW CAP_NET_ADMIN
        launch_command: ros2 launch soem_bringup bringup.launch.py

      - unit_name: ros2-infantry-chassis.service
        description: ROS2 Infantry Chassis Controller
        depends_on:
          - ros2-soem-bringup.service
        launch_command: ros2 launch infantry_controller infantry_chassis.launch.py
